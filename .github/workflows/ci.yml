name: ci

# Supply Chain Security:
# - All actions pinned to full SHA for immutable references
# - Safe Chain runs before dependency installation
# - Lifecycle scripts disabled during install
# - Minimal permissions following principle of least privilege

permissions:
  contents: read
  packages: read
  actions: read

on:
  push:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        # actions/checkout v5.0.1 (Node 24 対応)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          submodules: true

      - name: Setup Bun
        # oven-sh/setup-bun v2.0.2
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76

      # Supply Chain Security: Setup safe-chain before dependency installation
      - name: Setup safe-chain
        run: |
          bun add -g @aikidosec/safe-chain
          safe-chain setup-ci

      # Supply Chain Security: Disable lifecycle scripts during install
      # Note: --safe-chain-skip-minimum-package-age is used because transitive
      # dependencies (e.g. textlint -> @modelcontextprotocol/sdk -> hono) may
      # include recently released packages that have not yet aged out of the
      # safe-chain minimum age check.
      - name: Install packages via packages.json
        env:
          npm_config_ignore_scripts: "true"
          CI: "true"
        run: make install_ci

      - name: lint typecheck test build
        run: |
          make before-commit

  swift:
    # KotoInput (入力メソッド本体) のビルドとテスト。FoundationModels SDK を
    # 含む Xcode が必要なため macOS 26 ランナーを使う。Apple Intelligence は
    # ランナーでは利用できないため、実モデル依存のテストは自動でスキップされる。
    runs-on: macos-26
    steps:
      - name: Check out the code
        # actions/checkout v5.0.1 (Node 24 対応)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          submodules: true

      - name: Show toolchain versions
        run: |
          sw_vers
          swift --version

      - name: Build all targets
        run: swift build --package-path KotoInput

      - name: Run tests
        run: swift test --package-path KotoInput
